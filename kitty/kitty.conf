# ==============================================================================
# KITTY CONFIG - Entorno DevOps Tokyo Night
# ~/.config/kitty/kitty.conf
# ==============================================================================

# --- FUENTES ---
# JetBrains Mono es ideal para distinguir bien caracteres en scripts y YAMLs
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.5

# --- RENDIMIENTO Y WAYLAND ---
# Forzar Wayland nativo (evita que pase por XWayland)
linux_display_server wayland
# Sincronización estricta con el monitor (vital para aprovechar los 144Hz)
sync_to_monitor yes

# --- VENTANA Y ESTÉTICA ---
# Opacidad al 85% para que el 'blur' de tu Hyprland (passes=2) haga su magia de fondo
background_opacity 0.85
dynamic_background_opacity yes

# Quitar los bordes feos de Wayland (tu Hyprland ya dibuja ese borde Tokyo Night)
hide_window_decorations yes
window_padding_width 12

# --- CURSOR Y COMPORTAMIENTO ---
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# Historial largo para no perder el output de compilaciones o logs de red
scrollback_lines 10000

# Copiar al portapapeles automáticamente al seleccionar texto 
# (Hace sinergia perfecta con el wl-clipboard que tienes en el autostart)
copy_on_select yes

# --- PALETA DE COLORES: TOKYO NIGHT ---
# Fondo y texto base
foreground #c0caf5
background #1a1b26
selection_foreground #c0caf5
selection_background #283457

# Cursor
cursor #c0caf5
cursor_text_color #1a1b26

# Colores normales (Negro, Rojo, Verde, Amarillo, Azul, Magenta, Cian, Blanco)
color0 #15161e
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #7dcfff
color7 #a9b1d6

# Colores brillantes
color8 #414868
color9 #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5
# ==============================================================================
# MEJORAS DEVOPS Y WORKFLOW
# ==============================================================================

# Control Remoto (Requerido para Broadcast y scripts)
allow_remote_control socket-only
listen_on unix:/tmp/kitty

# Historial para Logs
scrollback_pager_history_size 50

# Shell Integration nativa
shell_integration enabled

# Layouts (Adiós Tmux)
enabled_layouts splits,stack,tall,grid
map ctrl+shift+enter launch --location=split
map ctrl+shift+h launch --location=hsplit
map ctrl+shift+d launch --location=vsplit
map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down

# Kittens (Superpoderes)
map f11 launch --allow-remote-control kitty +kitten broadcast

# Atajos útiles
# Ctrl+Shift+G: Muestra el output del último comando en un paginador
# Ctrl+Shift+Z: Salta al prompt anterior
# --- ESTILO DE LAS DIVISIONES (Splits) ---
# Fuerza a que se dibuje un borde completo y más grueso alrededor del panel
window_margin_width 2

# Colores del borde (Paleta Tokyo Night)
active_border_color #bb9af7
inactive_border_color #414868

# --- ATENUACIÓN DE PANELES INACTIVOS ---
# Desvanece el texto de las terminales que no tienen el foco [i]
inactive_text_alpha 0.5
