background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 4
}

input-field {
    monitor = DP-2
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(bb9af7)
    inner_color = rgb(1a1b26)
    font_color = rgb(c0caf5)
    fade_on_empty = false
    placeholder_text = <i>Desbloquear entorno...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
