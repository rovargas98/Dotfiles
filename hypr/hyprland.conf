# ==============================================================================
# ARCHIVO MAESTRO HYPRLAND - Entorno DevOps Tokyo Night
# ==============================================================================

# 1. FUENTES DE MÓDULOS (La base de tu entorno modular)
# Asegúrate de que estos archivos existen en ~/dotfiles/hypr/
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/colors.conf
source = ~/.config/hypr/layout.conf
source = ~/.config/hypr/decoration.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/binds.conf

# 2. VARIABLES DE ENTORNO (Crítico para NVIDIA y Wayland)
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = GLX_VENDOR_LIBRARY_NAME,nvidia
env = XCURSOR_SIZE,24

# 3. AUTOSTART (Demonios y servicios del sistema)
# Autenticación (Crítico para virt-manager y comandos sudo gráficos)
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Historial de portapapeles (Vital para DevOps)
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

# Demonios de UI e Integración
exec-once = waybar
exec-once = mako        # Usamos mako en lugar de dunst según tu guía v2
exec-once = hyprpaper   # Demonio de fondos de pantalla
exec-once = pypr        # Demonio de Scratchpads
exec-once = eww daemon
exec-once = eww open-many command-center
exec-once = rm -f "$XDG_RUNTIME_DIR/hypr/$HYPRLAND_INSTANCE_SIGNATURE/.pyprland.sock" && pypr
exec-once = /home/ro/proyectos/hyperhdr/hyperhdr/bin/hyperhdr

# 4. DISPOSITIVOS DE ENTRADA Y CURSOR
input {
    kb_layout = es
    follow_mouse = 1
}

cursor {
    # IMPORTANTE: En true para evitar que el cursor desaparezca con drivers NVIDIA
    no_hardware_cursors = true 
}
# 5. REGLAS DE VENTANAS ESPECÍFICAS (Sintaxis de Bloques Actualizada)

# --- Regla para el diálogo ISO de virt-manager ---
windowrule {
    name = virt-manager-iso
    match:class = virt-manager
    match:title = Localizar soporte ISO
    size = 800 600
    center = 1
}

# --- Reglas para Scratchpads (Pyprland) ---
windowrule {
    name = pypr-term
    match:class = scratch-term
    float = 1
    center = 1
}

windowrule {
    name = pypr-notes
    match:class = scratch-notes
    float = 1
    center = 1
}

windowrule {
    name = pypr-serial
    match:class = scratch-serial
    float = 1
    center = 1
}

windowrule {
    name = pypr-spotify
    # Soporta regex básico para atrapar mayúsculas y minúsculas
    match:class = Spotify|spotify
    float = 1
    center = 1
}
